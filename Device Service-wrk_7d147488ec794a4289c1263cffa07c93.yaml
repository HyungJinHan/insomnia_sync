        4. `PUT`, `DELETE` 모두 단일 `GET`과 동일한 로직으로 작동
        	- _`DELETE` 이벤트 실행 후, 모두 `GET` 이벤트 실행 필요 (단일 `GET` 이벤트 에러 발생으로 인함)_
